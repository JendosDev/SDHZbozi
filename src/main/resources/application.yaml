spring:
  application:
    name: SDHZbozi
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/spolek_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Prague}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

cloudinary:
  url: ${CLOUDINARY_URL:}
  folder: ${CLOUDINARY_FOLDER:sdh-zbozi}